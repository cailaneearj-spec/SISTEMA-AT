<!DOCTYPE html>
<html lang="pt-BR" data-tema="escuro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema AT · Prontuário Terapêutico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="CSS/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4fb0a5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sistema AT">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

<!-- ===================== TELA DE LOGIN ===================== -->
<div id="tela-login" class="tela-login">
  <div class="login-box">
    <div class="sidebar-brand-mark" style="width:56px;height:56px;font-size:20px;border-radius:14px;margin:0 auto 20px;">AT</div>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:6px;">Sistema AT</h1>
    <p style="font-size:13.5px;color:var(--text-secondary);margin-bottom:32px;">Prontuário Terapêutico</p>
    <button class="btn btn-primario btn-bloco" id="btn-login-google" style="gap:12px;padding:12px 20px;font-size:14px;">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar com Google
    </button>
    <p style="font-size:11.5px;color:var(--text-muted);margin-top:20px;">Seus dados ficam vinculados à sua conta Google e sincronizados entre todos os dispositivos.</p>
  </div>
</div>

<!-- ===================== APP SHELL ===================== -->
<div class="app-shell" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-mark">AT</div>
      <div class="sidebar-brand-text">
        <strong>Sistema AT</strong>
        <span>Prontuário Terapêutico</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#/criancas" class="nav-item" data-rota="criancas">
        <span class="nav-icon" data-icon="criancas"></span>
        <span>Crianças</span>
      </a>
      <a href="#/atendimentos" class="nav-item" data-rota="atendimentos">
        <span class="nav-icon" data-icon="atendimentos"></span>
        <span>Atendimentos</span>
      </a>
      <a href="#/historicos" class="nav-item" data-rota="historicos">
        <span class="nav-icon" data-icon="historicos"></span>
        <span>Históricos</span>
      </a>
      <a href="#/resumos" class="nav-item" data-rota="resumos">
        <span class="nav-icon" data-icon="resumos"></span>
        <span>Resumos</span>
      </a>
      <a href="#/devolutivas" class="nav-item" data-rota="devolutivas">
        <span class="nav-icon" data-icon="devolutivas"></span>
        <span>Devolutivas</span>
      </a>
      <a href="#/relatorios" class="nav-item" data-rota="relatorios">
        <span class="nav-icon" data-icon="relatorios"></span>
        <span>Relatórios</span>
      </a>
      <a href="#/backup" class="nav-item" data-rota="backup">
        <span class="nav-icon" data-icon="backup"></span>
        <span>Backup</span>
      </a>

      <div class="sidebar-divider"></div>

      <a href="#/configuracoes" class="nav-item" data-rota="configuracoes">
        <span class="nav-icon" data-icon="configuracoes"></span>
        <span>Configurações</span>
      </a>
      <a href="#/ajuda" class="nav-item" data-rota="ajuda">
        <span class="nav-icon" data-icon="ajuda"></span>
        <span>Ajuda</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <span id="sidebar-status-db">Conectando…</span>
      <button class="btn btn-fantasma btn-pequeno" id="btn-sair" style="margin-top:8px;width:100%;">Sair</button>
    </div>
  </aside>

  <!-- CONTEÚDO -->
  <main class="main-content">
    <div id="view-root" class="view-root"></div>
  </main>

</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div id="modal-box" class="modal-box" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button type="button" class="modal-close" id="modal-close-btn" aria-label="Fechar">&times;</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- TOASTS -->
<div id="toast-container" class="toast-container"></div>

<!-- SDK Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- SCRIPTS (ordem importa) -->
<script src="JS/banco.js"></script>
<script src="JS/ui.js"></script>
<script src="JS/criancas.js"></script>
<script src="JS/atendimentos.js"></script>
<script src="JS/historicos.js"></script>
<script src="JS/resumos.js"></script>
<script src="JS/devolutivas.js"></script>
<script src="JS/relatorios.js"></script>
<script src="JS/backup.js"></script>
<script src="JS/configuracoes.js"></script>
<script src="JS/ajuda.js"></script>
<script src="JS/app.js"></script>
</body>
</html>
