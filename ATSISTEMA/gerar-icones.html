<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Gerar Ícones PWA</title></head>
<body>
<p>Clique nos botões para baixar os ícones. Salve-os na pasta <strong>icons/</strong> do projeto.</p>
<button onclick="gerar(192)">Baixar icon-192.png</button>
<button onclick="gerar(512)">Baixar icon-512.png</button>
<canvas id="c" style="display:none"></canvas>
<script>
function gerar(size) {
  const canvas = document.getElementById('c');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const r = size * 0.18;

  // Fundo escuro arredondado
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = '#10141a';
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0); ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r); ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.fill();

  // Badge gradiente
  const g = ctx.createLinearGradient(size*.2,size*.2,size*.8,size*.8);
  g.addColorStop(0,'#4fb0a5'); g.addColorStop(1,'#3d9990');
  ctx.fillStyle = g;
  const bx=size*.2,by=size*.2,bw=size*.6,bh=size*.6,br=size*.12;
  ctx.beginPath();
  ctx.moveTo(bx+br,by); ctx.lineTo(bx+bw-br,by); ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+br);
  ctx.lineTo(bx+bw,by+bh-br); ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);
  ctx.lineTo(bx+br,by+bh); ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br);
  ctx.lineTo(bx,by+br); ctx.quadraticCurveTo(bx,by,bx+br,by);
  ctx.closePath(); ctx.fill();

  // Texto AT
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size*.28}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('AT', size/2, size/2);

  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
